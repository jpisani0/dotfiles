[window]
title = "Alacritty"
padding.x = 5
padding.y = 5
opacity = 0.8
blur = true
dimensions.lines = 40
dimensions.columns = 150

[font]
normal.family = "Hurmit Nerd Font Mono"
normal.style = "Regular"
size = 10.0

[font.bold]
family = "Hurmit Nerd Font Mono"
style = "Bold"

[font.italic]
family = "Hurmit Nerd Font Mono"
style = "Bold"

[cursor]
style.shape = "Beam"
style.blinking = "Never"
unfocused_hollow = false

[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "#011a1f"
